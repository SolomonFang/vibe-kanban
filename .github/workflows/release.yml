name: Release (multi-platform npm)

# Builds vibe-kanban server/mcp/review binaries for Linux + macOS + Windows (x64),
# bundles them into the npx-cli package, and publishes to npm.
#
# Trigger manually from Actions tab. Choose version bump or pass "skip"
# to publish the version currently in npx-cli/package.json.

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump in npx-cli/package.json"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
          - skip
      dry_run:
        description: "Dry run: build & pack, skip publish + tag"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-multi-platform
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.13.1"
  RUST_TOOLCHAIN: "nightly-2025-12-04"

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_tag: ${{ steps.bump.outputs.new_tag }}
      ref: ${{ steps.bump.outputs.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Bump version
        id: bump
        run: |
          cd npx-cli
          if [ "${{ inputs.version_bump }}" != "skip" ]; then
            npm version "${{ inputs.version_bump }}" --no-git-tag-version
          fi
          new_version=$(node -p "require('./package.json').version")
          new_tag="v${new_version}"
          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"

          if [ "${{ inputs.version_bump }}" = "skip" ] || [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${new_tag}" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and tag
        if: ${{ inputs.version_bump != 'skip' && !inputs.dry_run }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add npx-cli/package.json
          git commit -m "chore(release): ${{ steps.bump.outputs.new_tag }}"
          git tag "${{ steps.bump.outputs.new_tag }}"
          git push
          git push --tags

  build-frontend:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter ./frontend run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          if-no-files-found: error
          retention-days: 1

  # Linux-only matrix. macOS Intel + Apple Silicon are built in one macos-14 job
  # so we avoid macos-13 (Intel-hosted) runner queues which often sit "Waiting...".
  build-backend-linux:
    needs: [bump-version, build-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - name: linux-arm64
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.ref }}

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev cmake nasm ninja-build pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.target }}-

      - name: Build binaries
        shell: bash
        env:
          # Match local-build.sh defaults so embedded URLs work the same.
          VK_SHARED_API_BASE: "https://api.vibekanban.com"
          VITE_VK_SHARED_API_BASE: "https://api.vibekanban.com"
        run: |
          cargo build --release --target "${{ matrix.target }}" \
            --bin server --bin mcp_task_server --bin review

      - name: Package zips
        shell: bash
        run: |
          set -euo pipefail
          OUT="dist/${{ matrix.name }}"
          mkdir -p "$OUT"
          BIN_DIR="target/${{ matrix.target }}/release"

          cp "$BIN_DIR/server"          vibe-kanban
          cp "$BIN_DIR/mcp_task_server" vibe-kanban-mcp
          cp "$BIN_DIR/review"          vibe-kanban-review

          zip -q "$OUT/vibe-kanban.zip"        vibe-kanban
          zip -q "$OUT/vibe-kanban-mcp.zip"    vibe-kanban-mcp
          zip -q "$OUT/vibe-kanban-review.zip" vibe-kanban-review

          rm -f vibe-kanban vibe-kanban-mcp vibe-kanban-review
          ls -lh "$OUT"

      - uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.name }}
          path: dist/${{ matrix.name }}/
          if-no-files-found: error
          retention-days: 1

  build-backend-macos:
    needs: [bump-version, build-frontend]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.ref }}

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-macos-both-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-macos-both-

      - name: Build and package (macos-x64 + macos-arm64)
        shell: bash
        env:
          VK_SHARED_API_BASE: "https://api.vibekanban.com"
          VITE_VK_SHARED_API_BASE: "https://api.vibekanban.com"
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist

          build_and_zip() {
            local target="$1"
            local name="$2"
            local dep_target="$3"
            export MACOSX_DEPLOYMENT_TARGET="$dep_target"
            cargo build --release --target "$target" \
              --bin server --bin mcp_task_server --bin review
            local out="dist/${name}"
            mkdir -p "$out"
            local bin_dir="target/${target}/release"
            cp "$bin_dir/server"          vibe-kanban
            cp "$bin_dir/mcp_task_server" vibe-kanban-mcp
            cp "$bin_dir/review"          vibe-kanban-review
            zip -q "$out/vibe-kanban.zip"        vibe-kanban
            zip -q "$out/vibe-kanban-mcp.zip"    vibe-kanban-mcp
            zip -q "$out/vibe-kanban-review.zip" vibe-kanban-review
            rm -f vibe-kanban vibe-kanban-mcp vibe-kanban-review
            ls -lh "$out"
          }

          build_and_zip x86_64-apple-darwin macos-x64 10.12
          build_and_zip aarch64-apple-darwin macos-arm64 11.0

      - uses: actions/upload-artifact@v4
        with:
          name: backend-macos-x64
          path: dist/macos-x64/
          if-no-files-found: error
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: backend-macos-arm64
          path: dist/macos-arm64/
          if-no-files-found: error
          retention-days: 1

  # Windows x64 only (GitHub-hosted ARM64 Windows is not generally available).
  build-backend-windows:
    needs: [bump-version, build-frontend]
    runs-on: windows-latest
    env:
      VK_SHARED_API_BASE: "https://api.vibekanban.com"
      VITE_VK_SHARED_API_BASE: "https://api.vibekanban.com"
      CARGO_PROFILE_RELEASE_DEBUG: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.ref }}

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-pc-windows-msvc

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-windows-x64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-windows-x64-

      - name: Build binaries
        shell: pwsh
        run: |
          cargo build --release --target x86_64-pc-windows-msvc `
            --bin server --bin mcp_task_server --bin review

      - name: Package zips
        shell: pwsh
        run: |
          $binDir = "target/x86_64-pc-windows-msvc/release"
          $outRoot = "dist/windows-x64"
          New-Item -ItemType Directory -Force -Path $outRoot | Out-Null

          @(
            @{ Src = "server.exe"; BinName = "vibe-kanban"; Zip = "vibe-kanban.zip" },
            @{ Src = "mcp_task_server.exe"; BinName = "vibe-kanban-mcp"; Zip = "vibe-kanban-mcp.zip" },
            @{ Src = "review.exe"; BinName = "vibe-kanban-review"; Zip = "vibe-kanban-review.zip" }
          ) | ForEach-Object {
            $staging = "./$($_.BinName).exe"
            Copy-Item "$binDir/$($_.Src)" -Destination $staging
            $zipPath = Join-Path $outRoot $_.Zip
            if (Test-Path $zipPath) { Remove-Item $zipPath }
            Compress-Archive -LiteralPath $staging -DestinationPath $zipPath
            Remove-Item $staging
          }
          Get-ChildItem $outRoot

      - uses: actions/upload-artifact@v4
        with:
          name: backend-windows-x64
          path: dist/windows-x64/
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: [bump-version, build-backend-linux, build-backend-macos, build-backend-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: backend-*
          path: artifacts/

      - name: Assemble npx-cli/dist
        shell: bash
        run: |
          set -euo pipefail
          rm -rf npx-cli/dist
          mkdir -p npx-cli/dist
          for d in artifacts/backend-*; do
            platform="${d#artifacts/backend-}"
            mkdir -p "npx-cli/dist/${platform}"
            cp "${d}"/*.zip "npx-cli/dist/${platform}/"
          done
          echo "Final layout:"
          find npx-cli/dist -type f | sort

      - name: Pack preview
        run: |
          cd npx-cli
          npm pack --dry-run

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npx-cli
          npm publish --access public

      - name: Create GitHub Release
        if: ${{ inputs.version_bump != 'skip' && !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.new_tag }}
          name: ${{ needs.bump-version.outputs.new_tag }}
          generate_release_notes: true
